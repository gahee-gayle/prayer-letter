<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기도 편지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal-900: #0a3832; --teal-800: #0f4a42; --teal-700: #155c52;
      --teal-400: #2d9e8e; --teal-200: #8ed4ca; --teal-100: #c4eae6; --teal-50: #edf4f2;
      --blush-400: #e8a0a8; --blush-300: #f0bec4; --blush-200: #f7d8db; --blush-100: #fceef0;
      --cream-50: #f4f7f5; --cream-100: #e6ede9; --cream-200: #cdd9d2;
      --text-on-dark: #f0faf9; --text-muted-dark: rgba(240,250,249,0.65);
      --text-primary: #1a2e2c; --text-secondary: #4a6560; --text-tertiary: #8aaba6;
      --font-serif: 'Noto Serif KR', Georgia, serif;
      --font-sans: 'Noto Sans KR', sans-serif;
    }
    html { font-size: clamp(14px, 1vw, 16px); }
    body { font-family: var(--font-sans); background: var(--teal-800); color: var(--text-primary); min-height: 100vh; }

    .bg-pattern { display: none; }

    header {
      background: rgba(10,56,50,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: none; margin: 0 auto; padding: 0 15%;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted-dark); text-decoration: none;
      font-size: 14px; transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text-on-dark); }
    .lang-toggle { display: flex; gap: 6px; }
    .lang-btn {
      padding: 6px 14px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 13px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: var(--text-muted-dark);
      transition: all 0.15s;
    }
    .lang-btn.active { background: var(--blush-300); color: var(--teal-900); border-color: var(--blush-300); font-weight: 500; }
    .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: var(--text-on-dark); }

    main { max-width: none; margin: 0 auto; padding: 2.5rem 15% 5rem; position: relative; z-index: 1; }

    .letter-wrap {
      background: var(--cream-50);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(10,56,50,0.2);
    }

    /* ── Letter Header (photo hero) ── */
    .letter-header {
      position: relative; overflow: hidden;
      height: 420px;
      background: var(--teal-800);
    }
    .lh-photo {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .lh-overlay { display: none; }
    /* 사진 없을 때 fallback */
    .letter-header.no-photo {
      background: var(--teal-800);
      background-image: url('letter_header.png');
      background-size: cover; background-position: center 60%;
      display: flex; align-items: center; justify-content: center;
    }
    .letter-header.no-photo::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,50,45,0.35); z-index: 0;
    }
    /* 제목/날짜 바 (사진 아래) */
    .letter-title-bar {
      background: var(--cream-100);
      padding: 1.5rem 2rem 1.25rem;
      text-align: center;
      border-bottom: 1px solid var(--cream-200);
    }
    /* 사진 없을 때 제목은 헤더 안에 */
    .lh-title-inner {
      position: relative; z-index: 2;
    }
    .lh-logo {
      position: absolute; top: 22px; right: 26px;
      display: flex; align-items: center; gap: 12px; z-index: 3;
    }
    .lh-logo-cross { width: 26px; height: 42px; position: relative; flex-shrink: 0; }
    .lh-logo-cross::before, .lh-logo-cross::after {
      content: ''; position: absolute; background: var(--blush-300); border-radius: 2px;
    }
    .lh-logo-cross::before { width: 3px; height: 42px; left: 11.5px; top: 0; }
    .lh-logo-cross::after { width: 26px; height: 3px; left: 0; top: 13px; }
    .lh-logo-text { display: flex; flex-direction: column; line-height: 1.35; }
    .lh-logo-name {
      font-family: var(--font-serif); font-size: 19px; font-weight: 500;
      color: var(--text-on-dark); letter-spacing: 0.14em; text-transform: uppercase;
    }
    .lh-logo-sub {
      font-size: 11px; color: var(--text-muted-dark);
      letter-spacing: 0.26em; text-transform: uppercase;
    }
    .lh-cross { width: 22px; height: 34px; position: relative; margin: 0 auto 12px; z-index: 2; }
    .lh-cross::before, .lh-cross::after { content: ''; position: absolute; background: var(--blush-300); border-radius: 2px; }
    .lh-cross::before { width: 3px; height: 34px; left: 9.5px; top: 0; }
    .lh-cross::after { width: 22px; height: 3px; left: 0; top: 10px; }
    .lh-title {
      font-family: var(--font-serif);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 500; color: var(--text-primary);
      line-height: 1.3;
    }
    .lh-date { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

    .main-photo { width: 100%; height: 360px; object-fit: cover; display: block; }

    .letter-body { padding: 2rem 2.5rem; }
    .letter-greeting { font-style: italic; font-size: 17px; color: var(--text-secondary); margin-bottom: 1rem; }

    .pv-block { margin-bottom: 1.75rem; }
    .pv-block-text { font-size: 17px; color: var(--text-primary); line-height: 1.9; white-space: pre-wrap; margin-bottom: 0.85rem; }
    .pv-block-photos { display: grid; gap: 6px; margin-top: 0.75rem; }
    .pv-block-photos img { width: 100%; border-radius: 10px; object-fit: cover; display: block; }

    /* layout-full: stacked, full width — fixed height */
    .pv-block-photos.layout-full { grid-template-columns: 1fr; }
    .pv-block-photos.layout-full img { height: 400px !important; max-height: none !important; object-fit: cover; }

    /* layout-half: side by side at 50% — fixed height */
    .pv-block-photos.layout-half { display: flex; flex-wrap: wrap; gap: 6px; }
    .pv-block-photos.layout-half img { width: calc(50% - 3px) !important; height: 260px !important; max-height: none !important; object-fit: cover; }

    /* layout-grid: 2-column grid — fixed height */
    .pv-block-photos.layout-grid { grid-template-columns: 1fr 1fr; }
    .pv-block-photos.layout-grid img { height: 220px !important; max-height: none !important; object-fit: cover; }

    @media (max-width: 680px) {
      .pv-block-photos.layout-half { display: grid !important; grid-template-columns: 1fr !important; }
      .pv-block-photos.layout-half img { width: 100% !important; height: 280px !important; }
      .pv-block-photos.layout-grid { grid-template-columns: 1fr !important; }
      .pv-block-photos.layout-grid img { height: 280px !important; }
    }

    .prayer-box {
      margin-top: 1.5rem;
      background: var(--teal-50);
      border-left: 3px solid var(--teal-400);
      border-radius: 0 10px 10px 0;
      padding: 1rem 1.25rem;
    }
    .prayer-title { font-size: 11px; font-weight: 500; color: var(--teal-700); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .prayer-item { font-size: 14px; color: var(--teal-800); line-height: 2; }

    .letter-footer {
      text-align: center;
      padding: 1.25rem 2rem;
      border-top: 1px solid var(--cream-200);
      font-size: 14px; color: var(--text-secondary);
      font-style: italic;
    }

    .share-bar {
      margin-top: 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      flex-wrap: wrap;
    }
    .share-label { font-size: 13px; color: var(--text-muted-dark); }
    .subscribe-wrap {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .subscribe-label { font-size: 13px; color: var(--text-muted-dark); }
    .subscribe-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .subscribe-input {
      padding: 8px 18px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: var(--text-on-dark);
      font-family: var(--font-sans); font-size: 13px;
      outline: none; width: 220px;
    }
    .subscribe-input::placeholder { color: rgba(240,250,249,0.4); }
    .subscribe-btn {
      padding: 8px 20px; border-radius: 999px;
      background: var(--teal-100); color: var(--teal-900);
      border: none; font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .subscribe-btn:hover { background: #aed9d4; }
    .subscribe-msg { font-size: 13px; min-height: 18px; }
    .share-btn {
      padding: 8px 18px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: var(--text-on-dark);
      transition: all 0.15s;
    }
    .share-btn:hover { background: rgba(255,255,255,0.15); }
    .share-btn.copied { background: var(--teal-700); border-color: var(--teal-700); }
    .donate-btn-inline {
      display: inline-block; padding: 8px 20px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
      background: var(--blush-300); color: var(--teal-900);
      transition: background 0.15s;
    }
    .donate-btn-inline:hover { background: var(--blush-400); }

    /* ── Lightbox ── */
    .lightbox-bg {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-bg.open { display: flex; }
    .lightbox-img {
      max-width: 88vw; max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      cursor: default;
      transition: opacity 0.15s;
    }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: white; font-size: 20px; line-height: 36px; text-align: center;
      cursor: pointer; border: none;
      transition: background 0.15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: white;
      font-size: 22px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }
    .lightbox-nav[hidden] { display: none; }
    .lightbox-dots {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 7px;
    }
    .lightbox-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.15s;
    }
    .lightbox-dot.active { background: white; }
    .pv-block-photos img { cursor: zoom-in; }

    /* ── Admin Modal ── */
    .admin-modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .admin-modal-bg.open { display: flex; }
    .admin-modal {
      background: var(--teal-800);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 2rem 2rem 1.5rem;
      width: min(340px, 90vw);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .admin-modal-title {
      font-family: var(--font-sans); font-size: 15px;
      color: var(--text-on-dark); font-weight: 500;
    }
    .admin-modal-input {
      width: 100%; padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: white; font-family: var(--font-sans); font-size: 15px;
      letter-spacing: 0.2em; outline: none; text-align: center;
    }
    .admin-modal-input::placeholder { letter-spacing: 0.05em; color: rgba(255,255,255,0.4); }
    .admin-modal-btns { display: flex; gap: 8px; width: 100%; }
    .admin-modal-ok {
      flex: 1; padding: 9px; border-radius: 999px;
      background: var(--blush-300); color: var(--teal-900);
      border: none; font-family: var(--font-sans); font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .admin-modal-ok:hover { background: var(--blush-400); }
    .admin-modal-cancel {
      flex: 1; padding: 9px; border-radius: 999px;
      background: transparent; color: var(--text-muted-dark);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-sans); font-size: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .admin-modal-cancel:hover { background: rgba(255,255,255,0.08); }
    .admin-modal-err { font-size: 13px; color: var(--blush-300); min-height: 18px; }

    /* ── Support Footer ── */
    .support-footer {
      margin-top: 2.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 1.25rem 0 0.5rem;
      text-align: center;
    }
    .support-footer-copy { font-size: 13px; color: rgba(240,250,249,0.7); margin-bottom: 0.5rem; }
    .support-footer-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240,250,249,0.45); margin-bottom: 0.75rem;
    }
    .support-footer-links {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; flex-wrap: wrap;
    }
    .support-footer-btn {
      display: inline-block;
      padding: 6px 16px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07); color: var(--text-on-dark);
      transition: all 0.15s;
    }
    .support-footer-btn:hover { background: rgba(255,255,255,0.14); }
    .support-footer-btn.paypal {
      background: var(--blush-300); color: var(--teal-900);
      border-color: var(--blush-300);
    }
    .support-footer-btn.paypal:hover { background: var(--blush-400); }
    .support-footer-divider {
      color: rgba(255,255,255,0.2); font-size: 12px;
    }

    .breadcrumb {
      padding: 0.75rem 15%;
      position: relative; z-index: 1;
    }
    .breadcrumb a {
      color: rgba(240,250,249,0.55); text-decoration: none;
      font-size: 13px; transition: color 0.15s;
    }
    .breadcrumb a:hover { color: rgba(240,250,249,0.9); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-muted-dark); }
    .spinner { width: 32px; height: 32px; margin: 0 auto 1rem; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--blush-300); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Print / PDF logo ── */
    .print-logo { display: none; }
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      header { display: none !important; }
      .breadcrumb { display: none !important; }
      .share-bar { display: none !important; }
      .lang-toggle { display: none !important; }
      .bg-pattern { display: none !important; }
      body { background: white !important; margin: 0; }
      main { padding: 0.25rem 2% !important; }
      .lightbox-bg { display: none !important; }
      .lh-logo { display: none !important; }
      .letter-wrap { box-shadow: none !important; border: none !important; border-radius: 0 !important; }
      .print-logo { display: none !important; }
      .letter-header { height: 280px !important; }
      .letter-title-bar { padding: 0.75rem 1.5rem 0.6rem !important; }
      .letter-body { padding: 1rem 1.5rem !important; }
      .letter-footer { padding: 0.75rem 1.5rem !important; }
      .pv-block { margin-bottom: 1rem !important; }
      .prayer-box { padding: 0.75rem 1rem !important; margin-top: 1rem !important; }
    }

    /* 데스크탑: 헤더 버튼 보임 / 편지 위 버튼 숨김 */
    .lang-toggle-bar { display: none; }
    .header-lang { display: flex; }

    @media (max-width: 600px) {
      /* 모바일: 헤더 버튼 숨김 / 편지 위 버튼 보임 */
      .header-lang { display: none !important; }
      .lang-toggle-bar {
        display: flex;
        justify-content: center;
        margin-bottom: 0.75rem;
      }
      .letter-body { padding: 1.25rem 5%; }
      .lang-btn {
        padding: 5px 14px;
        font-size: 12px;
        white-space: nowrap;
      }
      main { padding: 1rem 5% 4rem; }
      .letter-header { height: 240px; }
    }
  </style>
</head>
<body>
<div class="bg-pattern"></div>

<!-- 라이트박스 -->
<div class="lightbox-bg" id="lightbox-bg" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav prev" id="lb-prev" onclick="event.stopPropagation(); lbMove(-1)">‹</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lightbox-nav next" id="lb-next" onclick="event.stopPropagation(); lbMove(1)">›</button>
  <div class="lightbox-dots" id="lb-dots"></div>
</div>

<!-- 편집 비밀번호 모달 -->
<div class="admin-modal-bg" id="admin-modal-bg" onclick="if(event.target===this)closeAdminModal()">
  <div class="admin-modal">
    <div class="admin-modal-title">✏️ 편집 — 비밀번호 확인</div>
    <input class="admin-modal-input" type="password" id="admin-modal-pw"
      placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')confirmAdminPW()">
    <div class="admin-modal-err" id="admin-modal-err"></div>
    <div class="admin-modal-btns">
      <button class="admin-modal-ok" onclick="confirmAdminPW()">확인</button>
      <button class="admin-modal-cancel" onclick="closeAdminModal()">취소</button>
    </div>
  </div>
</div>

<div class="print-logo">
  <div class="print-cross"></div>
  <div class="print-logo-text">
    <span class="print-logo-name">Abigail's</span>
    <span class="print-logo-sub">Prayer Letter</span>
  </div>
</div>

<header>
  <div class="header-inner">
    <a href="letters.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <div style="width:22px;height:34px;position:relative;flex-shrink:0;">
        <span style="position:absolute;width:3px;height:34px;background:#f0bec4;border-radius:2px;left:9.5px;top:0;"></span>
        <span style="position:absolute;width:22px;height:3px;background:#f0bec4;border-radius:2px;left:0;top:10px;"></span>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1.25;align-items:center;">
        <span style="font-family:'Noto Serif KR',serif;font-size:20px;font-weight:500;color:#f0faf9;letter-spacing:0.18em;text-transform:uppercase;">Abigail's</span>
        <span style="font-size:9.5px;color:rgba(240,250,249,0.6);letter-spacing:0.28em;text-transform:uppercase;">Prayer Letter</span>
      </div>
    </a>
    <div class="lang-toggle header-lang">
      <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    </div>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb" style="display:none;">
  <a href="letters.html" id="breadcrumb-link">← 목록으로 돌아가기</a>
</div>

<main>
  <div class="lang-toggle-bar">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    </div>
  </div>
  <div id="content">
    <div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://aqgrnrhtqsxdrlljtsrk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxZ3Jucmh0cXN4ZHJsbGp0c3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTY1NjUsImV4cCI6MjA5MTU3MjU2NX0.yeM2Biz1XWAfp9IRga3-SSiu2bokc3hpJT2QS86josk';
let currentLang = new URLSearchParams(location.search).get('lang') === 'en' ? 'en' : 'ko';
let currentSlug = null;
let letterData = null;

async function loadLetter() {
  const slug = new URLSearchParams(location.search).get('id');
  if (!slug) { document.getElementById('content').innerHTML = '<p style="color:white;text-align:center;padding:4rem">편지를 찾을 수 없어요.</p>'; return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/letters?slug=eq.${slug}&select=slug,title,title_en,date,greeting,greeting_en,body_blocks,prayer_items,closing,closing_en,main_photo`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!data.length) { document.getElementById('content').innerHTML = '<p style="color:white;text-align:center;padding:4rem">편지를 찾을 수 없어요.</p>'; return; }
    letterData = data[0];
    currentSlug = slug;
    renderLetter();
  } catch(e) {
    console.error('Letter load error:', e);
    document.getElementById('content').innerHTML = '<p style="color:white;text-align:center;padding:4rem">불러오기 실패.</p>';
  }
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  renderLetter();
}

function renderLetter() {
  if (!letterData) return;
  const l = letterData;
  const isEn = currentLang === 'en';
  const title = isEn && l.title_en ? l.title_en : l.title;
  const greeting = isEn && l.greeting_en ? l.greeting_en : l.greeting;
  const closing = isEn && l.closing_en ? l.closing_en : l.closing;
  const dateStr = l.date ? new Date(l.date + 'T00:00:00').toLocaleDateString(isEn ? 'en-US' : 'ko-KR', { year:'numeric', month:'long', day:'numeric' }) : '';
  const blocks = l.body_blocks || [];
  const prayers = l.prayer_items || [];

  const blocksHtml = blocks.map(b => {
    const text = isEn ? (b.textEn || b.textKo) : b.textKo;
    const photos = b.photos || [];
    const layout = b.photoLayout || 'full';
    return `<div class="pv-block">
      ${text ? `<div class="pv-block-text">${text}</div>` : ''}
      ${photos.length ? `<div class="pv-block-photos layout-${layout}" data-photos='${JSON.stringify(photos).replace(/'/g,"&#39;")}'>${photos.map((src, i) => `<img src="${src}" alt="" onclick="openLightbox(JSON.parse(this.closest('[data-photos]').dataset.photos),${i})">`).join('')}</div>` : ''}
    </div>`;
  }).join('');

  const filledPrayers = prayers.filter(p => p.ko || p.en);
  const prayerHtml = filledPrayers.length ? `
    <div class="prayer-box">
      <div class="prayer-title">${isEn ? 'Prayer Requests' : '기도 제목'}</div>
      ${filledPrayers.map((p,i) => {
        const txt = isEn ? (p.en || p.ko) : p.ko;
        return txt ? `<div class="prayer-item">${i+1}. ${txt}</div>` : '';
      }).filter(Boolean).join('')}
    </div>` : '';

  // Update breadcrumb
  const bc = document.getElementById('breadcrumb');
  const bcLink = document.getElementById('breadcrumb-link');
  if (bc) bc.style.display = 'block';
  if (bcLink) bcLink.textContent = isEn ? '← Back to Letters' : '← 목록으로 돌아가기';

  document.getElementById('content').innerHTML = `
    <div style="position:relative;">
    <div class="letter-wrap">
      <div class="letter-header ${l.main_photo ? '' : 'no-photo'}">
        <div class="lh-logo">
          <div class="lh-logo-cross"></div>
          <div class="lh-logo-text">
            <span class="lh-logo-name">Abigail's</span>
            <span class="lh-logo-sub">Prayer Letter</span>
          </div>
        </div>
        ${l.main_photo ? `<img class="lh-photo" src="${l.main_photo}" alt=""><div class="lh-overlay"></div>` : ''}
      </div>
      <div class="letter-title-bar" style="position:relative;">
        <div class="lh-title">${title}</div>
        <div class="lh-date">${dateStr}</div>
        ${sessionStorage.getItem('pl_auth') === '1' ? `<button onclick="openAdminModal(currentSlug)" style="
          position:absolute; top:50%; right:1.25rem; transform:translateY(-50%);
          padding:5px 14px; border-radius:999px;
          font-family:var(--font-sans); font-size:12px; font-weight:500;
          cursor:pointer;
          border:1px solid var(--cream-200);
          background:var(--cream-100);
          color:var(--text-secondary);
          transition:all 0.15s;
        " onmouseover="this.style.background='var(--teal-100)';this.style.color='var(--teal-800)';this.style.borderColor='var(--teal-200)'"
           onmouseout="this.style.background='var(--cream-100)';this.style.color='var(--text-secondary)';this.style.borderColor='var(--cream-200)'">편집</button>` : ''}
      </div>
      <div class="letter-body">
        ${greeting ? `<div class="letter-greeting">${greeting}</div>` : ''}
        ${blocksHtml}
        ${prayerHtml}
      </div>
      <div class="letter-footer">${closing || (isEn ? 'In His grace, Abigail' : '주님의 은혜안에서, Abigail 드림')}</div>
    </div>
    </div>
    ${sessionStorage.getItem('pl_auth') === '1' ? `
    <div class="share-bar">
      <button class="share-btn" onclick="copyLink(this, ${isEn ? 'true' : 'false'})">${isEn ? 'Share Letter' : '편지 공유'}</button>
      <button class="share-btn" onclick="sendToSubscribers(this, ${isEn ? 'true' : 'false'})">${isEn ? 'Send to Subscribers' : '구독자에게 보내기'}</button>
      <button class="share-btn" onclick="downloadPDF(${isEn ? 'true' : 'false'})">${isEn ? 'Save as PDF' : 'PDF 저장'}</button>
    </div>` : `
    <div class="share-bar">
      <button class="share-btn" onclick="copyLink(this, ${isEn ? 'true' : 'false'})">${isEn ? 'Share Letter' : '편지 공유'}</button>
      <a href="donate.html${isEn ? '?lang=en' : ''}" class="donate-btn-inline"><span style="color:#2d8a6e;">♥</span> ${isEn ? 'Support' : '후원하기'}</a>
    </div>
    <div class="subscribe-wrap">
      <div class="subscribe-label">${isEn ? 'Get notified when a new letter is posted' : '새 편지가 올라오면 알림을 받으세요'}</div>
      <div class="subscribe-row">
        <input class="subscribe-input" id="sub-email" type="email" placeholder="${isEn ? 'your@email.com' : '이메일 주소'}">
        <button class="subscribe-btn" onclick="subscribe(${isEn ? 'true' : 'false'})">${isEn ? 'Subscribe' : '구독하기'}</button>
      </div>
      <div class="subscribe-msg" id="sub-msg"></div>
    </div>`}
    `;
}

function downloadPDF(isEn) {
  window.print();
}

async function sendToSubscribers(btn, isEn) {
  if (!confirm(isEn ? 'Send this letter to all subscribers?' : '모든 구독자에게 이 편지를 보낼까요?')) return;
  const original = btn.textContent;
  btn.textContent = isEn ? 'Sending...' : '발송 중...';
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-newsletter`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        slug: currentSlug,
        title: letterData.title,
        title_en: letterData.title_en
      })
    });
    const data = await res.json();
    btn.textContent = isEn ? `✓ Sent to ${data.sent}` : `✓ ${data.sent}명에게 발송 완료`;
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 3000);
  } catch {
    btn.textContent = isEn ? 'Failed' : '발송 실패';
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
  }
}

async function subscribe(isEn) {
  const email = document.getElementById('sub-email')?.value?.trim();
  const msg = document.getElementById('sub-msg');
  if (!email || !email.includes('@')) {
    msg.style.color = '#f0bec4';
    msg.textContent = isEn ? 'Please enter a valid email.' : '올바른 이메일을 입력해 주세요.';
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ email, lang: isEn ? 'en' : 'ko', subscribed_at: new Date().toISOString() })
    });
    if (res.ok || res.status === 409) {
      msg.style.color = '#8ed4ca';
      msg.textContent = isEn ? '✓ Subscribed! Thank you.' : '✓ 구독 완료! 감사합니다.';
      document.getElementById('sub-email').value = '';
    } else {
      throw new Error();
    }
  } catch {
    msg.style.color = '#f0bec4';
    msg.textContent = isEn ? 'Something went wrong. Please try again.' : '오류가 발생했어요. 다시 시도해 주세요.';
  }
}

function copyLink(btn, isEn) {
  const base = `${location.origin}${location.pathname}?id=${currentSlug}`;
  const url = isEn ? `${base}&lang=en` : base;
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = isEn ? 'Link Copied!' : '링크 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = isEn ? 'Share Letter' : '편지 공유';
      btn.classList.remove('copied');
    }, 2000);
  });
}

let pendingEditSlug = null;

function openAdminModal(slug) {
  console.log('openAdminModal called with slug:', slug, '/ currentSlug:', currentSlug);
  pendingEditSlug = slug || currentSlug;
  document.getElementById('admin-modal-pw').value = '';
  document.getElementById('admin-modal-err').textContent = '';
  document.getElementById('admin-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('admin-modal-pw').focus(), 50);
}

function closeAdminModal() {
  document.getElementById('admin-modal-bg').classList.remove('open');
  pendingEditSlug = null;
}

function confirmAdminPW() {
  const pw = document.getElementById('admin-modal-pw').value;
  if (pw === '7922') {
    sessionStorage.setItem('pl_auth', '1');
    const editSlug = pendingEditSlug; // closeAdminModal이 null로 리셋하기 전에 저장
    closeAdminModal();
    window.location.href = `index.html?edit=${editSlug}`;
  } else {
    const err = document.getElementById('admin-modal-err');
    err.textContent = '비밀번호가 틀렸어요';
    document.getElementById('admin-modal-pw').value = '';
    setTimeout(() => { err.textContent = ''; }, 2000);
  }
}

let lbPhotos = [], lbIndex = 0;

function openLightbox(photos, idx) {
  lbPhotos = photos;
  lbIndex = idx;
  lbRender();
  document.getElementById('lightbox-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox-bg').classList.remove('open');
  document.body.style.overflow = '';
}
function lbMove(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  lbRender();
}
function lbRender() {
  const img = document.getElementById('lightbox-img');
  img.style.opacity = '0';
  setTimeout(() => { img.src = lbPhotos[lbIndex]; img.style.opacity = '1'; }, 80);

  const multi = lbPhotos.length > 1;
  document.getElementById('lb-prev').hidden = !multi;
  document.getElementById('lb-next').hidden = !multi;

  const dotsEl = document.getElementById('lb-dots');
  dotsEl.innerHTML = multi
    ? lbPhotos.map((_, i) => `<div class="lightbox-dot ${i === lbIndex ? 'active' : ''}"></div>`).join('')
    : '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbMove(-1);
  if (e.key === 'ArrowRight') lbMove(1);
});

// 초기 언어 버튼 active 상태 동기화
document.querySelectorAll('.lang-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.lang === currentLang);
});

loadLetter();
</script>
</body>
</html>
