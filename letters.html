<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기도 편지 모음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal-900: #0a3832; --teal-800: #0f4a42; --teal-700: #155c52;
      --teal-400: #2d9e8e; --teal-100: #c4eae6; --teal-50: #edf4f2;
      --blush-300: #f0bec4; --blush-200: #f7d8db; --blush-100: #fceef0;
      --cream-50: #f4f7f5; --cream-100: #e6ede9; --cream-200: #cdd9d2;
      --text-on-dark: #f0faf9; --text-muted-dark: rgba(240,250,249,0.65);
      --text-primary: #1a2e2c; --text-secondary: #4a6560; --text-tertiary: #8aaba6;
      --font-serif: 'Noto Serif KR', Georgia, serif;
      --font-sans: 'Noto Sans KR', sans-serif;
    }
    html { font-size: clamp(14px, 1vw, 16px); }
    body { font-family: var(--font-sans); background: var(--teal-800); color: var(--text-primary); min-height: 100vh; }

    .bg-pattern { display: none; }

    header {
      background: rgba(10,56,50,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: none; margin: 0 auto; padding: 0 15%;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .cross { width: 22px; height: 34px; position: relative; }
    .cross::before, .cross::after { content: ''; position: absolute; background: var(--blush-300); border-radius: 2px; }
    .cross::before { width: 3px; height: 34px; left: 9.5px; top: 0; }
    .cross::after { width: 22px; height: 3px; left: 0; top: 10px; }
    .logo-text { font-family: var(--font-serif); font-size: 15px; color: var(--text-on-dark); }
    .lang-toggle { display: flex; gap: 6px; }
    .lang-btn {
      padding: 5px 13px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 12px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.18);
      background: transparent; color: var(--text-muted-dark);
      transition: all 0.15s;
    }
    .lang-btn.active { background: rgba(45,158,142,0.25); color: var(--text-on-dark); border-color: var(--teal-400); font-weight: 500; }
    .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: var(--text-on-dark); }
    .write-btn {
      padding: 8px 20px;
      background: var(--blush-300); color: var(--teal-900);
      border: none; border-radius: 999px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background 0.18s;
    }
    .write-btn:hover { background: var(--blush-200); }

    main { max-width: none; margin: 0 auto; padding: 3rem 15% 6rem; position: relative; z-index: 1; }

    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(24px, 3vw, 36px);
      color: var(--text-on-dark);
      margin-bottom: 0.5rem;
      font-weight: 400;
    }
    .page-sub { font-size: 14px; color: var(--text-muted-dark); margin-bottom: 3rem; }

    .year-group { margin-bottom: 2.5rem; }
    .year-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-muted-dark);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1rem;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .letter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px 20px; }
    .letter-card { box-shadow: 0 2px 16px rgba(10,56,50,0.18); }
    .card-preview { font-size: 14px; line-height: 1.75; -webkit-line-clamp: 4; }

    .letter-card {
      background: var(--cream-50);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 12px rgba(10,56,50,0.15);
    }
    .letter-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(10,56,50,0.25); }

    .card-header {
      background: var(--teal-800);
      background-image: url('letter_header.png');
      background-size: cover;
      background-position: center 60%;
      height: 200px;
      position: relative;
      overflow: hidden;
    }
    .card-photo-overlay { display: none; }
    .card-title-bar {
      padding: 0.85rem 1.25rem 0.7rem;
      background: var(--cream-100);
      border-bottom: 1px solid var(--cream-200);
      text-align: center;
    }
    .card-title {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .card-date { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    .card-body { padding: 1rem 1.25rem 1.25rem; }
    .card-preview {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 0.75rem;
      font-size: 12px; color: var(--teal-400);
    }
    .admin-btns { display: flex; gap: 6px; }
    .admin-edit-btn, .admin-del-btn {
      padding: 4px 10px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 11px;
      cursor: pointer; border: none; font-weight: 500;
      transition: all 0.15s;
    }
    .admin-edit-btn { background: var(--teal-100); color: var(--teal-800); }
    .admin-edit-btn:hover { background: var(--teal-200); }
    .admin-del-btn { background: #fde8e8; color: #c0392b; }
    .admin-del-btn:hover { background: #fac8c8; }

    .empty { text-align: center; padding: 4rem 0; color: var(--text-muted-dark); }
    .empty-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }

    .loading { text-align: center; padding: 4rem 0; color: var(--text-muted-dark); }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 1rem;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--blush-300);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .letter-grid { grid-template-columns: 1fr; }
    }
    /* ── Support Footer ── */
    .support-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.75rem 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,56,50,0.88);
      backdrop-filter: blur(16px);
      text-align: center; z-index: 50;
    }
    .support-footer-copy { font-size: 13px; color: rgba(240,250,249,0.7); margin-bottom: 0.5rem; }
    .support-footer-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240,250,249,0.45); margin-bottom: 0.75rem;
    }
    .support-footer-links { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .support-footer-btn {
      display: inline-block; padding: 6px 16px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07); color: var(--text-on-dark);
      transition: all 0.15s;
    }
    .support-footer-btn:hover { background: rgba(255,255,255,0.14); }
    .support-footer-btn.paypal { background: var(--blush-300); color: var(--teal-900); border-color: var(--blush-300); }
    .support-footer-btn.paypal:hover { background: var(--blush-400); }
    .support-footer-divider { color: rgba(255,255,255,0.2); font-size: 12px; }
  </style>
</head>
<body>
<div class="bg-pattern"></div>

<header>
  <div class="header-inner">
    <a href="letters.html" class="logo">
      <div class="cross"></div>
      <div style="display:flex;flex-direction:column;line-height:1.25;align-items:center;">
        <span style="font-family:var(--font-serif);font-size:20px;font-weight:500;color:var(--text-on-dark);letter-spacing:0.18em;text-transform:uppercase;">Abigail's</span>
        <span style="font-size:9.5px;color:var(--text-muted-dark);letter-spacing:0.28em;text-transform:uppercase;">Prayer Letter</span>
      </div>
    </a>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="donate.html" id="donate-link" style="font-family:var(--font-sans);font-size:13px;color:var(--teal-900);background:var(--blush-300);padding:7px 16px;border-radius:999px;text-decoration:none;font-weight:600;transition:background 0.15s;" onmouseover="this.style.background='#e8a0a8'" onmouseout="this.style.background='#f0bec4'">♥ 후원하기</a>
      <a href="index.html" id="write-btn-header" class="write-btn" style="display:none;">편지 쓰기</a>
    </div>
  </div>
</header>

<main>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:2rem;">
    <div>
      <h1 class="page-title">Abigail's Prayer Letters</h1>
    </div>
    <div id="admin-bar" style="display:none;">
      <button id="admin-btn" onclick="toggleAdmin()" style="
        padding:8px 18px; border-radius:999px;
        font-family:var(--font-sans); font-size:13px;
        cursor:pointer; border:1px solid rgba(255,255,255,0.2);
        background:transparent; color:rgba(240,250,249,0.6);
        transition:all 0.15s;
      ">관리</button>
    </div>
  </div>

  <!-- 관리자 비밀번호 입력 -->
  <div id="admin-pw-wrap" style="display:none;margin-bottom:1.5rem;">
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="admin-pw" type="password" placeholder="비밀번호"
        style="padding:8px 16px;border-radius:999px;border:1px solid rgba(255,255,255,0.25);
        background:rgba(255,255,255,0.1);color:white;font-family:var(--font-sans);
        font-size:14px;outline:none;letter-spacing:0.15em;width:160px;"
        onkeydown="if(event.key==='Enter')checkAdminPW()">
      <button id="admin-pw-confirm" onclick="checkAdminPW()" style="
        padding:8px 18px;border-radius:999px;background:var(--blush-300);
        color:var(--teal-900);border:none;font-family:var(--font-sans);
        font-size:13px;font-weight:600;cursor:pointer;">확인</button>
      <span id="admin-pw-err" style="font-size:13px;color:#f0bec4;display:none;">틀렸어요</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>불러오는 중...</p>
    </div>
  </div>
  <div class="support-footer">
    <div class="support-footer-copy">© 2026 Abigail's Prayer Letter · All rights reserved</div>

  </div>
</main>

<script>
const SUPABASE_URL = 'https://aqgrnrhtqsxdrlljtsrk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxZ3Jucmh0cXN4ZHJsbGp0c3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTY1NjUsImV4cCI6MjA5MTU3MjU2NX0.yeM2Biz1XWAfp9IRga3-SSiu2bokc3hpJT2QS86josk';
let isAdmin = false;
let allLetters = [];
let currentLang = sessionStorage.getItem('pl_lang') || 'ko';

const T = {
  ko: {
    donate: '♥ 후원하기', write: '편지 쓰기',
    manage: '관리', managing: '관리 중 ✓',
    loading: '불러오는 중...', loadFail: '불러오기 실패. 잠시 후 다시 시도해 주세요.',
    empty: '아직 저장된 편지가 없어요.',
    noDate: '날짜 없음', noContent: '내용 없음',
    edit: '편집', del: '삭제',
    pwPlaceholder: '비밀번호', pwConfirm: '확인', pwWrong: '틀렸어요',
    delConfirm: (title) => `"${title}" 편지를 삭제할까요?\n이 작업은 되돌릴 수 없어요.`,
    delFail: '삭제 실패. 다시 시도해 주세요.',
  },
  en: {
    donate: '♥ Support', write: 'Write Letter',
    manage: 'Manage', managing: 'Managing ✓',
    loading: 'Loading...', loadFail: 'Failed to load. Please try again.',
    empty: 'No letters yet.',
    noDate: 'No date', noContent: 'No content',
    edit: 'Edit', del: 'Delete',
    pwPlaceholder: 'Password', pwConfirm: 'OK', pwWrong: 'Incorrect',
    delConfirm: (title) => `Delete "${title}"?\nThis action cannot be undone.`,
    delFail: 'Failed to delete. Please try again.',
  }
};

function setLang(lang) {
  currentLang = lang;
  sessionStorage.setItem('pl_lang', lang);
  const t = T[lang];
  // update header texts
  const donateLink = document.getElementById('donate-link');
  if (donateLink) {
    donateLink.textContent = t.donate;
    donateLink.href = lang === 'en' ? 'donate.html?lang=en' : 'donate.html';
  }
  const wb = document.getElementById('write-btn-header');
  if (wb) wb.textContent = t.write;
  const adminBtn = document.getElementById('admin-btn');
  if (adminBtn) adminBtn.textContent = isAdmin ? t.managing : t.manage;
  const pwInput = document.getElementById('admin-pw');
  if (pwInput) pwInput.placeholder = t.pwPlaceholder;
  const pwConfirmBtn = document.getElementById('admin-pw-confirm');
  if (pwConfirmBtn) pwConfirmBtn.textContent = t.pwConfirm;
  renderLetters(allLetters);
}

async function loadLetters() {
  const t = T[currentLang];
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/letters?select=slug,title,title_en,date,greeting,closing,main_photo`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allLetters = await res.json();
    renderLetters(allLetters);
  } catch(e) {
    document.getElementById('content').innerHTML = `<p class="empty">${t.loadFail}</p>`;
  }
}

function renderLetters(letters) {
  const t = T[currentLang];
  const isEn = currentLang === 'en';
  const content = document.getElementById('content');
  if (!letters.length) {
    content.innerHTML = `
      <div class="year-label" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;">
        <span></span>
        <div class="lang-toggle">
          <button class="lang-btn ${currentLang==='ko'?'active':''}" onclick="setLang('ko')">한국어</button>
          <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="setLang('en')">English</button>
        </div>
      </div>
      <div class="empty"><div class="empty-icon">✉</div><p>${t.empty}</p></div>`;
    return;
  }
  const byYear = {};
  letters.forEach(l => {
    const year = l.date ? l.date.substring(0,4) : t.noDate;
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(l);
  });
  const years = Object.keys(byYear).sort((a,b) => b - a);
  const langToggle = `
    <div class="lang-toggle">
      <button class="lang-btn ${currentLang==='ko'?'active':''}" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="setLang('en')">English</button>
    </div>`;
  content.innerHTML = years.map((year, i) => `
    <div class="year-group">
      <div class="year-label" style="display:flex;justify-content:space-between;align-items:center;">
        <span>${year}</span>
        ${i === 0 ? langToggle : ''}
      </div>
      <div class="letter-grid">
        ${byYear[year].map(l => letterCard(l, isEn, t)).join('')}
      </div>
    </div>`).join('');
}

function letterCard(l, isEn, t) {
  const blocks = l.body_blocks || [];
  const preview = isEn
    ? blocks.map(b => b.textEn || b.textKo || '').filter(Boolean).join(' ').substring(0, 100)
    : blocks.map(b => b.textKo || '').filter(Boolean).join(' ').substring(0, 100);
  const title = isEn && l.title_en ? l.title_en : l.title;
  const locale = isEn ? 'en-US' : 'ko-KR';
  const dateStr = l.date ? new Date(l.date + 'T00:00:00').toLocaleDateString(locale, { year:'numeric', month:'long', day:'numeric' }) : '';
  const langParam = isEn ? '&lang=en' : '';
  const adminBtns = isAdmin ? `
    <div class="admin-btns" onclick="event.preventDefault()">
      <button class="admin-edit-btn" onclick="editLetter('${l.slug}')">${t.edit}</button>
      <button class="admin-del-btn" onclick="deleteLetter('${l.slug}', '${l.title}')">${t.del}</button>
    </div>` : '';
  const photoStyle = l.main_photo
    ? `background-image: url('${l.main_photo}'); background-size: cover; background-position: center;`
    : '';
  return `
    <a href="letter.html?id=${l.slug}${langParam}" class="letter-card">
      <div class="card-header" style="${photoStyle}"></div>
      <div class="card-title-bar">
        <div class="card-title">${title}</div>
        <div class="card-date">${dateStr}</div>
      </div>
      <div class="card-body">
        <div class="card-preview">${preview || t.noContent}</div>
        <div class="card-footer">
          ${adminBtns}
        </div>
      </div>
    </a>`;
}

function toggleAdmin() {
  const t = T[currentLang];
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('admin-btn').textContent = t.manage;
    document.getElementById('admin-btn').style.color = 'rgba(240,250,249,0.6)';
    document.getElementById('admin-pw-wrap').style.display = 'none';
    renderLetters(allLetters);
    return;
  }
  const wrap = document.getElementById('admin-pw-wrap');
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

function checkAdminPW() {
  const t = T[currentLang];
  const val = document.getElementById('admin-pw').value;
  if (val === '7922') {
    isAdmin = true;
    document.getElementById('admin-pw-wrap').style.display = 'none';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-btn').textContent = t.managing;
    document.getElementById('admin-btn').style.color = '#f0bec4';
    renderLetters(allLetters);
  } else {
    const err = document.getElementById('admin-pw-err');
    err.style.display = 'inline';
    err.textContent = t.pwWrong;
    document.getElementById('admin-pw').value = '';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}

function editLetter(slug) {
  window.location.href = `index.html?edit=${slug}`;
}

async function deleteLetter(slug, title) {
  const t = T[currentLang];
  if (!confirm(t.delConfirm(title))) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/letters?slug=eq.${slug}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (res.ok) {
      allLetters = allLetters.filter(l => l.slug !== slug);
      renderLetters(allLetters);
    } else {
      alert(t.delFail);
    }
  } catch(e) {
    alert(t.delFail);
  }
}

// apply initial lang state
(function() {
  const t = T[currentLang];
  const donateLink = document.getElementById('donate-link');
  if (donateLink) {
    donateLink.textContent = t.donate;
    donateLink.href = currentLang === 'en' ? 'donate.html?lang=en' : 'donate.html';
  }
})();

loadLetters();

if (sessionStorage.getItem('pl_auth') === '1') {
  // 로그인: 편지쓰기 보이고, 후원 버튼 숨김
  const wb = document.getElementById('write-btn-header');
  if (wb) {
    wb.style.display = 'inline-block';
    wb.textContent = T[currentLang].write;
  }
  const donateLink = document.getElementById('donate-link');
  if (donateLink) donateLink.style.display = 'none';
  document.getElementById('admin-bar').style.display = 'block';
}
</script>
</body>
</html>
